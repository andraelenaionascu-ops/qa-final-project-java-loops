name: Pipeline Proiect Final  # Numele care apare in tab-ul Actions

on:
  push:
    branches: [ main ]  # Pipeline-ul porneste doar cand trimiti cod pe ramura principala

jobs:
  # JOB 1: Testarea (Aici verificam daca "decolarea" e sigura)
  test:
    runs-on: ubuntu-latest # Robotul foloseste un sistem Linux de la GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Copiaza codul tau pe serverul lor

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Maven Tests
        run: mvn test # Aceasta este comanda ceruta. Va rula chiar daca nu avem cod Java inca.

  # JOB 2: Build si Push (Aici "aterizam" in Docker Hub)
  build-and-push:
    needs: test # CRITIC: Acest job porneste DOAR daca job-ul "test" a terminat cu succes (verde)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # Foloseste secretele salvate anterior
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # inlocuieste 'utilizator' cu numele tau de Docker Hub
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/qa-final-project-java:latest